<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evolutionary Grid Simulation — 3D Isometric</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Force topbar onto one line always */
    #topbar {
      flex-wrap: nowrap !important;
      padding: 4px 8px !important;
      gap: 8px !important;
      align-items: center !important;
    }
    #topbar-title {
      font-size: 0.75rem !important;
      white-space: nowrap;
      flex-shrink: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    #topbar-title .badge {
      font-size: 0.65rem !important;
      padding: 1px 4px !important;
    }
    #topbar-hud {
      font-size: 0.75rem !important;
      gap: 8px !important;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #topbar-btns {
      margin-left: auto;
      flex-shrink: 0;
      gap: 4px !important;
      display: flex;
    }
    #topbar-btns button {
      font-size: 0.72rem !important;
      padding: 3px 7px !important;
      white-space: nowrap;
    }
    /* Double the controls panel font sizes */
    #controls-inner,
    #controls-inner label,
    #controls-inner .row-label,
    #controls-inner .slider-row span,
    #controls-inner select,
    #controls-inner .island-stat-item,
    #controls-inner .legend-row,
    #controls-inner .legend-note,
    #controls-inner strong {
      font-size: 1.3rem !important;
    }
    #controls-inner input[type=range] {
      height: 6px;
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div id="topbar">
    <div id="topbar-title">
      <span>Evo Grid Sim</span>
      <span class="badge">3D</span>
    </div>
    <div id="topbar-hud">
      <span>Gen: <strong id="generationCount">0</strong></span>
      <span>Pop: <strong id="populationCount">0</strong></span>
    </div>
    <div id="topbar-btns">
      <button id="startButton">&#9654; Start</button>
      <button id="pauseButton" disabled>&#9646;&#9646; Pause</button>
      <button id="resetButton">&#8635; Reset</button>
      <button id="toggleControls" title="Toggle controls">&#9881; &#9660;</button>
    </div>
  </div>

  <!-- COLLAPSIBLE CONTROLS -->
  <div id="controls-bar" class="collapsed">
    <div id="controls-inner">

      <div class="ctrl-group">
        <label>Migration Rate
          <div class="slider-row">
            <input type="range" id="migrationRateSlider" min="0" max="100" value="10" />
            <span id="migrationRateValue">10%</span>
          </div>
        </label>
        <label>Migration Interval
          <div class="slider-row">
            <input type="range" id="migrationIntervalSlider" min="10" max="200" step="10" value="50" />
            <span id="migrationIntervalValue">50 gen</span>
          </div>
        </label>
        <label>Simulation Speed
          <div class="slider-row">
            <input type="range" id="speedSlider" min="1" max="20" value="15" />
            <span id="speedValue">Fast</span>
          </div>
        </label>
      </div>

      <div class="ctrl-group">
        <label class="row-label">Migration Start Gen
          <select id="migrationStartGenDropdown">
            <option value="100">100</option>
            <option value="200" selected>200</option>
            <option value="300">300</option>
            <option value="400">400</option>
            <option value="500">500</option>
          </select>
        </label>
        <label class="row-label">Replacement
          <select id="replacementStrategyDropdown">
            <option value="leastFitted">Least Fit</option>
            <option value="random">Random</option>
          </select>
        </label>
        <label class="row-label autostop">
          <span>Auto-Stop</span>
          <input type="checkbox" id="autostopCheckbox" checked />
          <select id="stopConditionDropdown">
            <option value="allFitness100">All Islands Avg Fitness &ge; 100</option>
            <option value="generation500">Generation 500</option>
            <option value="generation1000">Generation 1000</option>
          </select>
        </label>
      </div>

      <div class="ctrl-group">
        <div class="island-inline">
          <strong>Island Statistics</strong>
          <div id="island-health-list">Initializing&hellip;</div>
        </div>
        <div class="legend-inline">
          <strong>Fitness Spectrum</strong>
          <div class="legend-row">
            <span>Low</span>
            <div class="fitness-gradient"></div>
            <span>High</span>
          </div>
          <p class="legend-note">Pillar height = tree height</p>
        </div>
      </div>

    </div>
  </div>

  <!-- CANVAS -->
  <div id="canvas-wrap">
    <canvas id="simCanvas"></canvas>
    <div id="tooltip"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
